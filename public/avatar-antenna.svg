<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="mast" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#bg)"/>
  <!-- Ondas de radio (arcos) -->
  <path d="M64 44 Q 90 64 64 84 Q 38 64 64 44" stroke="url(#wave)" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M64 38 Q 98 64 64 90 Q 30 64 64 38" stroke="url(#wave)" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M64 32 Q 106 64 64 96 Q 22 64 64 32" stroke="url(#wave)" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Mástil (poste fino, sin forma de iglesia) -->
  <rect x="61" y="52" width="6" height="56" rx="2" fill="url(#mast)" stroke="#64748b" stroke-width="1"/>
  <!-- Elementos de antena en la punta (dipole / broadcast) -->
  <line x1="44" y1="52" x2="84" y2="52" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="44" x2="76" y2="44" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="36" x2="64" y2="28" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="64" cy="24" r="4" fill="#fbbf24" stroke="#e2e8f0" stroke-width="1"/>
</svg>
